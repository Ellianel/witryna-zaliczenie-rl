<!DOCTYPE html>
<html lang="pl" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runo Leśne - Portal Informacyjny</title>
    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts: Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/portal.css">
</head>
<body class="bg-body text-body">

    <!-- Kontener na nawigację (Zadanie #9) -->
    <div id="nav-container"></div>

    <main>
        <!-- Kontener na Hero (Zadanie #3) -->
        <header id="hero" class="py-5 bg-primary text-white text-center shadow">
        <div class="container">
            <div class="row py-5">
                <div class="col-sm-8 offset-sm-2">
                    <h1 class="display-2 fw-bold mb-4">Informatyka</h1>
                    <p class="fs-4 mb-5">
                        Rozwiązuj z nami swoje problemy ze sprzętem i oprogramowaniem. Doskonal się w trudnej sztuce programowania. Rozwijaj się i pomagaj innym. Poświęć ½ godziny dziennie na zgłębianie tajników informatyki. Zapraszamy każdego.
                    </p>
                    <h2 class="h3 mb-4">Budujemy społeczność programistów Runo Leśne.</h2>
                    <a href="#contact" class="btn btn-lg btn-warning fw-bold px-5">Dołącz do nas</a>
                </div>
            </div>
        </div>
    </header>

        <!-- Kontener na Karty (Zadanie #4) -->
        <div id="cards-container"></div>

        <!-- Kontener na Karuzelę (Zadanie #5) -->
        <div id="carousel-container"></div>

        <!-- Kontener na Mapę (Zadanie #7) -->
        <div id="map-container"></div>

        <!-- Kontener na Kontakt (Zadanie #6) -->
        <div id="contact-container"></div>
    </main>

    <!-- Kontener na Stopkę (Zadanie #8) -->
    <div id="footer-container"></div>

    <!-- Bootstrap 5.3.3 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/script.js"></script>
